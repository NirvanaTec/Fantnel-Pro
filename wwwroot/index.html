<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渐变流体背景</title>
    <style>
        /* 重置默认边距和填充 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh; /* 让body至少占满整个视口高度 */
            display: flex;
            justify-content: center; /* 水平居中内容 */
            align-items: center; /* 垂直居中内容 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0f0e17; /* 设置基础背景颜色 */
            overflow: hidden; /* 隐藏溢出的动画元素 */
        }

        /* 创建一个覆盖全屏的绝对定位容器来放置动画背景 */
        .fluid-gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;

            /* 核心：使用多层径向渐变叠加 */
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 119, 194, 0.7) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(128, 222, 255, 0.7) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(66, 133, 244, 0.5) 0%, transparent 30%);

            /* 应用关键帧动画，让每一层渐变都动起来 */
            animation: fluidMove 10s ease-in-out infinite alternate;
        }

        /* 定义动画的关键帧 */
        @keyframes fluidMove {
            0% {
                /* 初始位置 */
                background-position: 
                    20% 30%,
                    80% 70%,
                    50% 50%;
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }
            100% {
                /* 结束位置，数值发生变化以产生流动感 */
                background-position: 
                    80% 10%,
                    20% 90%,
                    70% 30%;
                border-radius: 30% 60% 70% 40% / 40% 70% 30% 60%;
            }
        }

        /* 窗口控制按钮容器 */
        .window-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        /* 窗口控制按钮 */
        .window-control {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .window-control::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .window-control:hover::before {
            opacity: 1;
        }

        /* 关闭按钮 - 红色 */
        .btn-close {
            background: #ff5f57;
        }

        .btn-close:hover {
            background: #ff3b30;
        }

        .btn-close::before {
            background-image: linear-gradient(45deg, transparent 40%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.6) 60%, transparent 60%),
                              linear-gradient(-45deg, transparent 40%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.6) 60%, transparent 60%);
        }

        /* 最小化按钮 - 绿色 */
        .btn-minimize {
            background: #28c940;
        }

        .btn-minimize:hover {
            background: #13a82a;
        }

        .btn-minimize::before {
            height: 2px;
            width: 6px;
            border-radius: 1px;
            background: rgba(0, 0, 0, 0.6);
        }

        /* 页面主要内容的样式 */
        .content {
            position: relative;
            text-align: center;
            color: white;
            padding: 2rem;
            background: rgba(15, 14, 23, 0.7); /* 半透明背景色 */
            backdrop-filter: blur(10px); /* 添加毛玻璃效果 */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff77c8, #7defff);
            -webkit-background-clip: text; /* 使渐变色应用于文字 */
            background-clip: text;
            color: transparent;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- 动画背景层 -->
    <div class="fluid-gradient-bg" id="dragArea"></div>

    <!-- 窗口控制按钮 -->
    <div class="window-controls">
        <button class="window-control btn-minimize" id="btnMinimize" title="最小化"></button>
        <button class="window-control btn-close" id="btnClose" title="关闭"></button>
    </div>

    <!-- 页面内容层 -->
    <div class="content">
        <h1>涅槃科技</h1>
        <p>正在加载中，请稍后...</p>
    </div>

    <script>
        // 获取拖动区域
        const dragArea = document.getElementById('dragArea');

        // 获取窗口控制按钮
        const btnMinimize = document.getElementById('btnMinimize');
        const btnClose = document.getElementById('btnClose');

        // 发送消息到后端的辅助函数
        function sendMessage(action) {
            const message = JSON.stringify({ action: action });
            if (window.external && window.external.sendMessage) {
                window.external.sendMessage(message);
            }
        }

        // 接收后端消息的处理函数
        function receiveMessage(message) {
            try {
                const response = JSON.parse(message);
                if (response.code === 4) {
                    const contentElement = document.querySelector('.content p');
                    if (contentElement) {
                        contentElement.textContent = response.data;
                    }
                }
            } catch (e) {
                console.error('消息解析失败:', e);
            }
        }

        // 注册接收消息的处理器
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', (event) => {
                receiveMessage(event.data);
            });
        } else if (window.external) {
            window.external.receiveMessage = receiveMessage;
        }
        
        sendMessage('window:init');

        // 窗口控制按钮事件
        btnMinimize.addEventListener('click', function(e) {
            e.stopPropagation();
            sendMessage('window:minimize');
        });

        btnClose.addEventListener('click', function(e) {
            e.stopPropagation();
            sendMessage('window:close');
        });

        // 鼠标按下事件 - 立即触发拖拽
        dragArea.addEventListener('mousedown', function(e) {
            // 只响应左键
            if (e.button !== 0) return;
            
            // 立即发送拖拽消息，让 Win32 API 在鼠标按下的上下文中处理
            sendMessage('window:drag');
        });

    </script>
</body>
</html>
